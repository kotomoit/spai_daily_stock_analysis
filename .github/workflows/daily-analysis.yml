name: Daily Stock Analysis

on:
  workflow_dispatch:
    inputs:
      send_line:
        description: '是否在本次正式分析後發送 LINE'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '30 7 * * 1-5'

jobs:
  daily-analysis:
    name: daily-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
      LINE_MESSAGING_TOKEN: ${{ secrets.LINE_MESSAGING_TOKEN }}
      LINE_MESSAGING_USER_ID: ${{ secrets.LINE_MESSAGING_USER_ID }}
      STOCK_ANALYSIS_REPORT_OUTPUT_DIR: target/stock-analysis-reports

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: verify-secrets
        run: |
          test -n "${GOOGLE_API_KEY}" || { echo "Missing GOOGLE_API_KEY secret"; exit 1; }
          test -n "${FINMIND_API_TOKEN}" || { echo "Missing FINMIND_API_TOKEN secret"; exit 1; }
          test -n "${LINE_MESSAGING_TOKEN}" || { echo "Missing LINE_MESSAGING_TOKEN secret"; exit 1; }
          test -n "${LINE_MESSAGING_USER_ID}" || { echo "Missing LINE_MESSAGING_USER_ID secret"; exit 1; }

      - name: chmod-mvnw
        run: chmod +x mvnw

      - name: mvn-test
        env:
          STOCK_ANALYSIS_RUNNER_ENABLED: 'false'
          STOCK_ANALYSIS_REPORT_ENABLED: 'false'
          STOCK_ANALYSIS_LINE_NOTIFY_ENABLED: 'false'
        run: ./mvnw -B test

      - name: run-analysis
        env:
          STOCK_ANALYSIS_RUNNER_ENABLED: 'true'
          STOCK_ANALYSIS_REPORT_ENABLED: 'true'
          STOCK_ANALYSIS_LINE_NOTIFY_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.send_line || 'false' }}
        run: ./mvnw -B -DskipTests spring-boot:run '-Dspring-boot.run.arguments=--spring.main.web-application-type=none --spring.devtools.restart.enabled=false --spring.devtools.livereload.enabled=false'

      - name: upload-report-artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report-${{ github.run_number }}
          path: target/stock-analysis-reports/*.json
          if-no-files-found: error
          retention-days: 14
