name: Daily Stock Analysis

on:
  workflow_dispatch:
    inputs:
      send_line:
        description: '是否在本次正式分析後發送 LINE'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '30 7 * * 1-5'

concurrency:
  group: daily-stock-analysis
  cancel-in-progress: false

jobs:
  daily-analysis:
    name: daily-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
      LINE_MESSAGING_TOKEN: ${{ secrets.LINE_MESSAGING_TOKEN }}
      LINE_MESSAGING_USER_ID: ${{ secrets.LINE_MESSAGING_USER_ID }}
      STOCK_ANALYSIS_REPORT_OUTPUT_DIR: target/stock-analysis-reports

    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 設定 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 解析觸發模式與 LINE 開關
        id: execution-plan
        env:
          WORKFLOW_DISPATCH_SEND_LINE: ${{ github.event.inputs.send_line || 'false' }}
          SCHEDULED_LINE_ENABLED: ${{ vars.SCHEDULED_LINE_ENABLED || '' }}
        run: |
          trigger_mode="${GITHUB_EVENT_NAME}"
          dispatch_send_line="${WORKFLOW_DISPATCH_SEND_LINE:-false}"
          scheduled_line_enabled_raw="${SCHEDULED_LINE_ENABLED}"
          scheduled_line_enabled_normalized="$(printf '%s' "${scheduled_line_enabled_raw:-false}" | tr '[:upper:]' '[:lower:]')"
          scheduled_line_enabled_display="${scheduled_line_enabled_raw:-<未設定>}"

          if [ "${trigger_mode}" = "workflow_dispatch" ]; then
            if [ "${dispatch_send_line}" = "true" ]; then
              line_enabled="true"
              line_reason="workflow_dispatch 且 send_line=true"
            else
              line_enabled="false"
              line_reason="workflow_dispatch 但 send_line=false"
            fi
          elif [ "${trigger_mode}" = "schedule" ]; then
            if [ "${scheduled_line_enabled_normalized}" = "true" ]; then
              line_enabled="true"
              line_reason="schedule 且 Repository Variable SCHEDULED_LINE_ENABLED=true"
            else
              line_enabled="false"
              if [ -z "${scheduled_line_enabled_raw}" ]; then
                line_reason="schedule 但 Repository Variable SCHEDULED_LINE_ENABLED 未設定"
              else
                line_reason="schedule 且 Repository Variable SCHEDULED_LINE_ENABLED=${scheduled_line_enabled_raw}"
              fi
            fi
          else
            line_enabled="false"
            line_reason="非預期觸發來源，預設不發送 LINE"
          fi

          echo "trigger_mode=${trigger_mode}" >> "${GITHUB_OUTPUT}"
          echo "dispatch_send_line=${dispatch_send_line}" >> "${GITHUB_OUTPUT}"
          echo "scheduled_line_enabled_raw=${scheduled_line_enabled_raw}" >> "${GITHUB_OUTPUT}"
          echo "scheduled_line_enabled_display=${scheduled_line_enabled_display}" >> "${GITHUB_OUTPUT}"
          echo "line_enabled=${line_enabled}" >> "${GITHUB_OUTPUT}"
          echo "line_reason=${line_reason}" >> "${GITHUB_OUTPUT}"

      - name: 寫入執行前摘要
        env:
          TRIGGER_MODE: ${{ steps.execution-plan.outputs.trigger_mode }}
          DISPATCH_SEND_LINE: ${{ steps.execution-plan.outputs.dispatch_send_line }}
          SCHEDULED_LINE_ENABLED_DISPLAY: ${{ steps.execution-plan.outputs.scheduled_line_enabled_display }}
          LINE_ENABLED: ${{ steps.execution-plan.outputs.line_enabled }}
          LINE_REASON: ${{ steps.execution-plan.outputs.line_reason }}
        run: |
          {
            echo "## 執行前摘要"
            echo ""
            echo "- 觸發來源：\`${TRIGGER_MODE}\`"
            echo "- workflow_dispatch send_line：\`${DISPATCH_SEND_LINE}\`"
            echo "- Repository Variable SCHEDULED_LINE_ENABLED：\`${SCHEDULED_LINE_ENABLED_DISPLAY}\`"
            echo "- 本次 LINE 發送：\`${LINE_ENABLED}\`"
            echo "- LINE 判定說明：${LINE_REASON}"
            echo "- JSON 報告輸出目錄：\`${STOCK_ANALYSIS_REPORT_OUTPUT_DIR}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 驗證分析必要 secrets
        run: |
          test -n "${GOOGLE_API_KEY}" || { echo "Missing GOOGLE_API_KEY secret"; exit 1; }
          test -n "${FINMIND_API_TOKEN}" || { echo "Missing FINMIND_API_TOKEN secret"; exit 1; }

      - name: 需要發送 LINE 時驗證 LINE secrets
        if: steps.execution-plan.outputs.line_enabled == 'true'
        run: |
          test -n "${LINE_MESSAGING_TOKEN}" || { echo "Missing LINE_MESSAGING_TOKEN secret"; exit 1; }
          test -n "${LINE_MESSAGING_USER_ID}" || { echo "Missing LINE_MESSAGING_USER_ID secret"; exit 1; }

      - name: 賦予 Maven Wrapper 執行權限
        run: chmod +x mvnw

      - name: 執行 Maven 測試
        env:
          STOCK_ANALYSIS_RUNNER_ENABLED: 'false'
          STOCK_ANALYSIS_REPORT_ENABLED: 'false'
          STOCK_ANALYSIS_LINE_NOTIFY_ENABLED: 'false'
        run: ./mvnw -B test

      - name: 執行正式分析 runner
        env:
          ANALYSIS_TRIGGER_MODE: ${{ steps.execution-plan.outputs.trigger_mode }}
          LINE_ENABLE_REASON: ${{ steps.execution-plan.outputs.line_reason }}
          STOCK_ANALYSIS_RUNNER_ENABLED: 'true'
          STOCK_ANALYSIS_REPORT_ENABLED: 'true'
          STOCK_ANALYSIS_LINE_NOTIFY_ENABLED: ${{ steps.execution-plan.outputs.line_enabled }}
        run: |
          echo "觸發來源：${ANALYSIS_TRIGGER_MODE}"
          echo "本次 LINE 發送：${STOCK_ANALYSIS_LINE_NOTIFY_ENABLED}"
          echo "LINE 判定說明：${LINE_ENABLE_REASON}"
          ./mvnw -B -DskipTests spring-boot:run '-Dspring-boot.run.arguments=--spring.main.web-application-type=none --spring.devtools.restart.enabled=false --spring.devtools.livereload.enabled=false'

      - name: 驗證 JSON 報告輸出
        id: verify-report-output
        run: |
          shopt -s nullglob
          report_files=("${STOCK_ANALYSIS_REPORT_OUTPUT_DIR}"/*.json)
          report_count="${#report_files[@]}"

          echo "artifact_file_count=${report_count}" >> "${GITHUB_OUTPUT}"

          if [ "${report_count}" -eq 0 ]; then
            echo "artifact_status=未找到 JSON 報告檔" >> "${GITHUB_OUTPUT}"
            echo "artifact_sample_file=<無>" >> "${GITHUB_OUTPUT}"
            echo "找不到 JSON 報告檔，預期目錄：${STOCK_ANALYSIS_REPORT_OUTPUT_DIR}" >&2
            exit 1
          fi

          echo "artifact_status=已找到 ${report_count} 份 JSON 報告" >> "${GITHUB_OUTPUT}"
          echo "artifact_sample_file=${report_files[0]}" >> "${GITHUB_OUTPUT}"

          printf '找到的 JSON 報告：\n'
          printf '%s\n' "${report_files[@]}"

      - name: 上傳 JSON 報告 artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report-${{ github.run_number }}
          path: target/stock-analysis-reports/*.json
          if-no-files-found: error
          retention-days: 14

      - name: 寫入執行結果摘要
        if: always()
        env:
          TRIGGER_MODE: ${{ steps.execution-plan.outputs.trigger_mode }}
          LINE_ENABLED: ${{ steps.execution-plan.outputs.line_enabled }}
          LINE_REASON: ${{ steps.execution-plan.outputs.line_reason }}
          ARTIFACT_STATUS: ${{ steps.verify-report-output.outputs.artifact_status }}
          ARTIFACT_FILE_COUNT: ${{ steps.verify-report-output.outputs.artifact_file_count }}
          ARTIFACT_SAMPLE_FILE: ${{ steps.verify-report-output.outputs.artifact_sample_file }}
        run: |
          artifact_status="${ARTIFACT_STATUS:-JSON 報告驗證步驟未完成}"
          artifact_file_count="${ARTIFACT_FILE_COUNT:-0}"
          artifact_sample_file="${ARTIFACT_SAMPLE_FILE:-<無>}"

          {
            echo ""
            echo "## 執行結果"
            echo ""
            echo "- 觸發來源：\`${TRIGGER_MODE}\`"
            echo "- 本次 LINE 發送：\`${LINE_ENABLED}\`"
            echo "- LINE 判定說明：${LINE_REASON}"
            echo "- JSON 報告狀態：${artifact_status}"
            echo "- JSON 報告數量：\`${artifact_file_count}\`"
            echo "- JSON 範例檔案：\`${artifact_sample_file}\`"
            echo "- Artifact 名稱：\`stock-analysis-report-${{ github.run_number }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
